services:
  mysql:
    image: mysql:8.4
    container_name: codex-monitor-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: codex_monitor
      MYSQL_USER: monitor
      MYSQL_PASSWORD: monitor_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: codex-monitor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: codex-monitor-server
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: mysql://monitor:monitor_pass@mysql:3306/codex_monitor
      REDIS_HOST: redis
      SERVER_PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: codex-monitor-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: mysql://monitor:monitor_pass@mysql:3306/codex_monitor
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
    container_name: codex-monitor-client
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mysql_data:
